name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/example/soundanalyzer
          cp MainActivity.kt app/src/main/java/com/example/soundanalyzer/
          cp AudioProcessor.kt app/src/main/java/com/example/soundanalyzer/

          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "SoundAnalyzer"
          include ':app'
          EOF

          # Root build.gradle
          cat > build.gradle << 'EOF'          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.22' apply false
          }
          EOF

          # app/build.gradle - CORRECT GROOVY SYNTAX
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }

          android {
              namespace 'com.example.soundanalyzer'
              compileSdkVersion 34

              defaultConfig {
                  applicationId 'com.example.soundanalyzer'
                  minSdkVersion 24
                  targetSdkVersion 34
                  versionCode 1
                  versionName '1.0'
              }

              signingConfigs {
                  debug {
                      storeFile file("${System.getProperty('user.home')}/.android/debug.keystore")
                      storePassword 'android'
                      keyAlias 'androiddebugkey'
                      keyPassword 'android'
                  }
              }

              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.debug
                  }
              }

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }

              kotlinOptions {
                  jvmTarget = '17'
              }
              buildFeatures {
                  compose true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion '1.5.10'
              }
          }

          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'androidx.activity:activity-compose:1.8.2'
              implementation platform('androidx.compose:compose-bom:2024.02.00')
              implementation 'androidx.compose.ui:ui'
              implementation 'androidx.compose.material3:material3'
          }
          EOF

          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          org.gradle.daemon=false
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.RECORD_AUDIO"/>
              <application 
                  android:allowBackup="true" 
                  android:label="Sound Analyzer" 
                  android:theme="@android:style/Theme.Material.Light.NoActionBar"
                  android:icon="@android:drawable/ic_media_play">
                  <activity 
                      android:name=".MainActivity" 
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          touch app/proguard-rules.pro
      - name: Build APK
        run: gradle assembleRelease --no-daemon --no-parallel

      - name: Collect APK
        run: |
          mkdir -p ./artifacts
          find . -type f -name "*.apk" -exec cp {} ./artifacts/ \;
          echo "📦 Found APKs:"
          ls -lh ./artifacts/ || echo "⚠️ No APKs found"

      - uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: ./artifacts/*.apk
          retention-days: 90