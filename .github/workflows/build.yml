name: Auto-Config & Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Generate Android Project Files
        run: |
          mkdir -p app/src/main/java/com/example/soundanalyzer
          mkdir -p app/src/main/res/values

          cat > settings.gradle.kts << 'SETTINGS'
          pluginManagement { repositories { google(); mavenCentral(); gradlePluginPortal() } }
          dependencyResolutionManagement { repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS); repositories { google(); mavenCentral() } }
          rootProject.name = "SoundAnalyzer"
          include(":app")
          SETTINGS

          cat > build.gradle.kts << 'ROOT'
          plugins { id("com.android.application") version "8.5.0" apply false; id("org.jetbrains.kotlin.android") version "1.9.24" apply false }
          ROOT

          cat > app/build.gradle.kts << 'APP'
          plugins { id("com.android.application"); id("org.jetbrains.kotlin.android") }
          android { namespace="com.example.soundanalyzer"; compileSdk=34; defaultConfig { applicationId="com.example.soundanalyzer"; minSdk=24; targetSdk=34; versionCode=1; versionName="1.0" } buildTypes { release { isMinifyEnabled=false } } compileOptions { sourceCompatibility=JavaVersion.VERSION_17; targetCompatibility=JavaVersion.VERSION_17 } kotlinOptions { jvmTarget="17" } buildFeatures { compose=true } composeOptions { kotlinCompilerExtensionVersion="1.5.14" } }
          dependencies { implementation("androidx.core:core-ktx:1.13.1"); implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.4"); implementation("androidx.activity:activity-compose:1.9.1"); implementation(platform("androidx.compose:compose-bom:2024.08.00")); implementation("androidx.compose.ui:ui"); implementation("androidx.compose.material3:material3"); implementation("org.jtransforms:jtransforms:3.1") }
          APP

          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPS

          cat > app/src/main/AndroidManifest.xml << 'MANIFEST'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.RECORD_AUDIO"/>
            <application android:allowBackup="true" android:label="Sound Analyzer" android:theme="@android:style/Theme.Material.Light.NoActionBar" android:icon="@android:drawable/ic_media_play">
              <activity android:name=".MainActivity" android:exported="true">
                <intent-filter><action android:name="android.intent.action.MAIN"/><category android:name="android.intent.category.LAUNCHER"/></intent-filter>
              </activity>
            </application>
          </manifest>
          MANIFEST

          touch app/proguard-rules.pro

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30