name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Project
        run: |
          mkdir -p app/src/main/java/com/example/soundanalyzer
          cp MainActivity.kt app/src/main/java/com/example/soundanalyzer/
          cp AudioProcessor.kt app/src/main/java/com/example/soundanalyzer/

          # settings.gradle
          printf 'pluginManagement {\n    repositories { google(); mavenCentral() }\n}\ndependencyResolutionManagement {\n    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)\n    repositories { google(); mavenCentral() }\n}\nrootProject.name = "SoundAnalyzer"\ninclude ":app"\n' > settings.gradle

          # Root build.gradle
          printf 'plugins {\n    id "com.android.application" version "8.2.2" apply false\n    id "org.jetbrains.kotlin.android" version "1.9.22" apply false\n}\n' > build.gradle

          # app/build.gradle (Groovy DSL with correct syntax)
          printf 'plugins {\n    id "com.android.application"\n    id "org.jetbrains.kotlin.android"\n}\nandroid {\n    namespace "com.example.soundanalyzer"\n    compileSdkVersion 34\n    defaultConfig {\n        applicationId "com.example.soundanalyzer"\n        minSdkVersion 24\n        targetSdkVersion 34\n        versionCode 1\n        versionName "1.0"\n    }\n    signingConfigs {\n        debug {\n            storeFile file("${System.getProperty(\\"user.home\\")}/.android/debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }\n    buildTypes {\n        release {\n            minifyEnabled false\n            signingConfig signingConfigs.debug\n        }\n    }\n    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }\n    kotlinOptions {\n        jvmTarget = "17"\n    }\n    buildFeatures {\n        compose true\n    }\n    composeOptions {\n        kotlinCompilerExtensionVersion "1.5.10"\n    }\n}\ndependencies {\n    implementation "androidx.core:core-ktx:1.12.0"\n    implementation "androidx.lifecycle:lifecycle-runtime-ktx:2.7.0"\n    implementation "androidx.activity:activity-compose:1.8.2"\n    implementation platform("androidx.compose:compose-bom:2024.02.00")\n    implementation "androidx.compose.ui:ui"\n    implementation "androidx.compose.material3:material3"\n}\n' > app/build.gradle

          # gradle.properties
          printf 'org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8\nandroid.useAndroidX=true\nandroid.nonTransitiveRClass=true\norg.gradle.daemon=false\n' > gradle.properties

          # AndroidManifest.xml
          printf '<?xml version="1.0" encoding="utf-8"?>\n<manifest xmlns:android="http://schemas.android.com/apk/res/android">\n    <uses-permission android:name="android.permission.RECORD_AUDIO"/>\n    <application android:allowBackup="true" android:label="Sound Analyzer" android:theme="@android:style/Theme.Material.Light.NoActionBar" android:icon="@android:drawable/ic_media_play">\n        <activity android:name=".MainActivity" android:exported="true">\n            <intent-filter>\n                <action android:name="android.intent.action.MAIN"/>\n                <category android:name="android.intent.category.LAUNCHER"/>\n            </intent-filter>\n        </activity>\n    </application>\n</manifest>\n' > app/src/main/AndroidManifest.xml

          touch app/proguard-rules.pro

      - name: Build APK
        run: gradle assembleRelease --no-daemon --no-parallel

      - name: Collect APK
        run: |
          mkdir -p ./artifacts
          find . -type f -name "*.apk" -exec cp {} ./artifacts/ \;
          ls -lh ./artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: ./artifacts/*.apk
          retention-days: 90