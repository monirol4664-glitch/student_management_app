name: Build Android APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Project via Base64
        run: |
          mkdir -p app/src/main/java/com/example/soundanalyzer
          cp MainActivity.kt app/src/main/java/com/example/soundanalyzer/
          cp AudioProcessor.kt app/src/main/java/com/example/soundanalyzer/

          # settings.gradle
          echo '' | base64 -d > settings.gradle

          # Root build.gradle
          echo 'cGx1Z2lucyB7CiAgICBpZCAiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iIHZlcnNpb24gIjguMi4yIiBhcHBseSBmYWxzZQogICAgaWQgIm9yZy5qZXRicmFpbnMua290bGluLmFuZHJvaWQiIHZlcnNpb24gIjEuOS4yMiIgYXBwbHkgZmFsc2UKfQ==' | base64 -d > build.gradle

          # app/build.gradle - FIXED: "implementation" spelled correctly
          echo '' | base64 -d > app/build.gradle

          # gradle.properties
          echo 'b3JnLmdyYWRsZS5qdmttYXJncz0tWG14MjA0OG0gLURmaWxlLmVuY29kaW5nPVVURi04CmFuZHJvaWQudXNlQW5kcm9pZFg9dHJ1ZQphbmRyb2lkLm5vblRyYW5zaXRpdmVSY2xhc3M9dHJ1ZQpvcmcuZ3JhZGxlLmRhZW1vbj1mYWxzZQ==' | base64 -d > gradle.properties

          # AndroidManifest.xml - Valid system resources
          echo '' | base64 -d > app/src/main/AndroidManifest.xml

          touch app/proguard-rules.pro

      - name: Build APK
        run: gradle assembleRelease --no-daemon --no-parallel

      - name: Collect APK
        run: |
          mkdir -p ./artifacts
          find . -type f -name "*.apk" -exec cp {} ./artifacts/ \;
          ls -lh ./artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: ./artifacts/*.apk
          retention-days: 90