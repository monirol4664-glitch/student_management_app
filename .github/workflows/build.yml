name: Auto-Config & Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.9'

      - name: Accept Android Licenses
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          mkdir -p $ANDROID_HOME/cmdline-tools
          echo "y" | $ANDROID_HOME/cmdline-tools/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --channel=0 || true

      - name: Generate Project via Base64 (No Shell Escaping Issues)
        run: |
          mkdir -p app/src/main/java/com/example/soundanalyzer
          mkdir -p app/src/main/res/values

          # settings.gradle.kts
          echo '' | base64 -d > settings.gradle.kts

          # build.gradle.kts (root)
          echo 'cGx1Z2lucyB7CiAgICBpZCgiY29tLmFuZHJvaWQuYXBwbGljYXRpb24iKSB2ZXJzaW9uICI4LjUuMCIgYXBwbHkgZmFsc2UKICAgIGlkKCJvcmcqamV0YnJhaW5zLmtvdGxpbi5hbmRyb2lkIikgdmVyc2lvbiAiMS45LjIyIiBhcHBseSBmYWxzZQp9' | base64 -d > build.gradle.kts

          # app/build.gradle.kts
          echo '' | base64 -d > app/build.gradle.kts

          # gradle.properties
          echo 'b3JnLmdyYWRsZS5qdmttYXJncz0tWG14MjA0OG0gLURmaWxlLmVuY29kaW5nPVVURi04CmFuZHJvaWQudXNlQW5kcm9pZFg9dHJ1ZQphbmRyb2lkLm5vblRyYW5zaXRpdmVSY2xhc3M9dHJ1ZQphbmRyb2lkLmJ1aWxkZXIuc2RrRG93bmxvYWQ9dHJ1ZQpvcmcuZ3JhZGxlLmRhZW1vbj1mYWxzZQ==' | base64 -d > gradle.properties

          # AndroidManifest.xml
          echo '' | base64 -d > app/src/main/AndroidManifest.xml

          touch app/proguard-rules.pro

      - name: Build Release APK
        run: gradle assembleRelease --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30