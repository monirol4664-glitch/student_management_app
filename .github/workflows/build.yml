name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: android-actions/setup-android@v3

      - uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Config Files
        run: |
          # settings.gradle (one echo per line - no escaping issues)
          echo "pluginManagement {" > settings.gradle
          echo "    repositories { google(); mavenCentral() }" >> settings.gradle
          echo "}" >> settings.gradle
          echo "dependencyResolutionManagement {" >> settings.gradle
          echo "    repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)" >> settings.gradle
          echo "    repositories { google(); mavenCentral() }" >> settings.gradle
          echo "}" >> settings.gradle
          echo "rootProject.name = \"SoundAnalyzer\"" >> settings.gradle
          echo "include ':app'" >> settings.gradle

          # Root build.gradle
          echo "plugins {" > build.gradle
          echo "    id 'com.android.application' version '8.2.2' apply false" >> build.gradle
          echo "    id 'org.jetbrains.kotlin.android' version '1.9.22' apply false" >> build.gradle
          echo "}" >> build.gradle

          # app/build.gradle (Groovy DSL - simple syntax)
          echo "plugins {" > app/build.gradle
          echo "    id 'com.android.application'" >> app/build.gradle
          echo "    id 'org.jetbrains.kotlin.android'" >> app/build.gradle
          echo "}" >> app/build.gradle
          echo "android {" >> app/build.gradle
          echo "    namespace 'com.example.soundanalyzer'" >> app/build.gradle
          echo "    compileSdkVersion 34" >> app/build.gradle
          echo "    defaultConfig {" >> app/build.gradle
          echo "        applicationId 'com.example.soundanalyzer'" >> app/build.gradle
          echo "        minSdkVersion 24" >> app/build.gradle
          echo "        targetSdkVersion 34" >> app/build.gradle
          echo "        versionCode 1" >> app/build.gradle
          echo "        versionName '1.0'" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "    buildTypes {" >> app/build.gradle
          echo "        release {" >> app/build.gradle
          echo "            minifyEnabled false" >> app/build.gradle
          echo "            signingConfig signingConfigs.debug" >> app/build.gradle
          echo "        }" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "    compileOptions {" >> app/build.gradle
          echo "        sourceCompatibility JavaVersion.VERSION_17" >> app/build.gradle
          echo "        targetCompatibility JavaVersion.VERSION_17" >> app/build.gradle
          echo "    }" >> app/build.gradle
          echo "    kotlinOptions { jvmTarget = '17' }" >> app/build.gradle
          echo "    buildFeatures { compose true }" >> app/build.gradle
          echo "    composeOptions { kotlinCompilerExtensionVersion '1.5.10' }" >> app/build.gradle
          echo "}" >> app/build.gradle
          echo "dependencies {" >> app/build.gradle
          echo "    implementation 'androidx.core:core-ktx:1.12.0'" >> app/build.gradle
          echo "    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'" >> app/build.gradle
          echo "    implementation 'androidx.activity:activity-compose:1.8.2'" >> app/build.gradle
          echo "    implementation platform('androidx.compose:compose-bom:2024.02.00')" >> app/build.gradle
          echo "    implementation 'androidx.compose.ui:ui'" >> app/build.gradle
          echo "    implementation 'androidx.compose.material3:material3'" >> app/build.gradle
          echo "}" >> app/build.gradle

          # gradle.properties
          echo "org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8" > gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.nonTransitiveRClass=true" >> gradle.properties
          echo "org.gradle.daemon=false" >> gradle.properties

          # Ensure proguard file exists
          touch app/proguard-rules.pro

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon --no-parallel

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sound-analyzer-apk
          path: app/build/outputs/apk/release/*.apk
          retention-days: 90
