name: Build Calculator APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        channel: 'stable'
    
    - name: Backup your code and dependencies
      run: |
        cp lib/main.dart main.dart.backup
        cp pubspec.yaml pubspec.yaml.backup
    
    - name: Generate Android files
      run: flutter create --platforms=android . --overwrite
    
    - name: Restore your code and dependencies
      run: |
        cp main.dart.backup lib/main.dart
        cp pubspec.yaml.backup pubspec.yaml
    
    - name: Add flutter_launcher_icons to pubspec
      run: |
        echo "" >> pubspec.yaml
        echo "dev_dependencies:" >> pubspec.yaml
        echo "  flutter_launcher_icons: ^0.13.1" >> pubspec.yaml
        echo "" >> pubspec.yaml
        echo "flutter_launcher_icons:" >> pubspec.yaml
        echo "  android: true" >> pubspec.yaml
        echo "  image_path: assets/icons/1776416865173.png" >> pubspec.yaml
        echo "  min_sdk_android: 21" >> pubspec.yaml
    
    - name: Get dependencies
      run: flutter pub get
    
    - name: Generate app icon
      run: flutter pub run flutter_launcher_icons:main
    
    - name: Build APK
      run: flutter build apk --release
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: calculator-app
        path: build/app/outputs/flutter-apk/app-release.apk
        retention-days: 30
